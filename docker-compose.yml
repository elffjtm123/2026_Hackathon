services:
  api:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://feedback:feedback@postgres:5432/feedback}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_REQUIRED: ${REDIS_REQUIRED:-true}
      JWT_SECRET: ${JWT_SECRET:-development-only-secret-change-me-now}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000","http://localhost:5173"]}
      AI_MODE: ${AI_MODE:-mock}
      AUTO_CREATE_TABLES: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: feedback
      POSTGRES_USER: feedback
      POSTGRES_PASSWORD: feedback
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedback -d feedback"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
